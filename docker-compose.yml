services:
  db:
    image: postgres:16
    container_name: simple-notes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-net
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: simple-notes-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - app-net
    depends_on:
      - db

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
